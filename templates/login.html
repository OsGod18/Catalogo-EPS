<body>
    <header>
        <nav id="presentacion">
            <img src="../static/imagenes/header-icon.png" alt="" id = "icon-header">
            <h2 id = "titulo-header">Catalogo virtual EPS</h2>
        </nav>
    </header>

<main>
    <h1>Ingresa al catalogo virtual</h1>
    <br>

    <form action="{{ url_for('login') }}" method="POST">
        <p>Documento</p>
        <input type="text" name="documento" placeholder="Ingresa tu documento" required minlength="6" maxlength="10" inputmode="numeric" id="ingresar_datos_campo">

        <p>Pin</p>
        <input type="text" name="pin" placeholder="Ingresa tu PIN" required minlength="4" maxlength="4" inputmode="numeric" id="ingresar_datos_campo">

        <br><br>

        <p class="mensaje_error">{{ error }}</p>

        <input type="submit" value="Ingresar" id="boton-enviar">

        <nav id="contenedor-opciones-seguridad">
            <a class="opcion-seguridad" href="{{ url_for('crear_usuario') }}">No me encuentro registrado</a>
            <a class="opcion-seguridad" href="{{ url_for('modificar_pin_validar') }}">Olvide mi PIN</a>
        </nav>
    </form>

</main>

</body>
