<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear</title>
    <link rel="stylesheet" href="../../static/css/crud/crear_usuario.css">
    <link rel="icon" href="../../static/imagenes/icono-pestaña.png" type="image/png">
    
    <!--Infografia:-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


</head>  
<body>
    <header>
        <nav id="presentacion">
            <img src="../../static/imagenes/header-icon.png" alt="" id = "icon-header">
            <a id = "titulo-header" href="{{ url_for('catalogo') }}" target="_self">Regresar</a>
        </nav>
    </header>

<main>
    <h1>Crea tu usuario</h1>
    <br>

    <form action="{{ url_for('crear_usuario') }}" method="POST">
    <section id="contenedor-flex">

        <section class="contenedor-grupo">
            
            <section class="contenedor-input">
                <p>Documento</p>
                <input type="text" name="documento" placeholder="Ingresa tu documento" required minlength="6" maxlength="10" inputmode="numeric" value="{{ request.form.documento or '' }}" id="ingresar_datos_campo">
            </section>

            <section class="contenedor-input">
                <p>Nombre</p>
                <input type="text" name="nombre" placeholder="Ingresa tu nombre" required minlength="3" value="{{ request.form.nombre or '' }}" id="ingresar_datos_campo">
            </section>
            
            <section class="contenedor-input">
                <p>Pin</p>
                <input type="text" name="pin" placeholder="Ingresa tu PIN" required minlength="4" maxlength="4" inputmode="numeric" value="{{ request.form.pin or '' }}" id="ingresar_datos_campo">
            </section>

        </section>

        <section class="contenedor-grupo">

            <section class="contenedor-input">
                <p>Telefono</p>
                <input type="text" name="telefono" placeholder="Ingresa tu telefono" required minlength="10" maxlength="10" inputmode="numeric" value="{{ request.form.telefono or '' }}" id="ingresar_datos_campo">
            </section>

            <section class="contenedor-input">
                <p>Email</p>
                <input type="text" name="email" placeholder="Ingresa tu email" required minlength="10" value="{{ request.form.email or '' }}" id="ingresar_datos_campo">
            </section>

            <section class="contenedor-input">
                <p>Direccion</p>
                <input type="text" name="direccion" placeholder="Ingresa tu direccion" required minlength="10" value="{{ request.form.direccion or '' }}" id="ingresar_datos_campo">
            </section>

        </section>

    </section>

    <br><br>

    <p class="mensaje_error">{{ error }}</p>

    <input type="submit" value="Crear usuario" id="boton-enviar">

    </form>
</main>

    
</body>
</html>
