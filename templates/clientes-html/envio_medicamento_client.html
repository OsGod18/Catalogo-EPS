

<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=, initial-scale=1.0">
    <title>Envio Client</title>
    <link rel="stylesheet" href="../../static/css/clientes-css/envio_medicamento_client.css">
    <link rel="icon" href="../../static/imagenes/favicon-cliente.png" type="image/png">

    <!--Infografia:-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>


<header>
        <nav id="presentacion">
            <img src="../../static/imagenes/header-icon-cliente.png" alt="" id = "icon-header">
            <a href="{{ url_for('clientes.catalogo_client') }}" target="_self" id="titulo-header"><h2>Catalogo virtual EPS</h2></a>
        </nav>

    <div id="div-saldo">
        <p id = "texto-saldo"> Tu saldo:</p>
        <p id="saldo">$ {{ "{:,.0f}".format(usuario.saldo).replace(",", ".") }}</p>
    </div>
</header>


<main>

    <h1 class="titulo"> Selecciona una fecha para tu {{ medicamento }} </h1>

    <form action="{{ url_for('clientes.guardar_solicitud_client') }}" method="POST">

        <!-- Datos ocultos que vienen desde el medicamento -->
        <input type="hidden" name="medicamento" value="{{ medicamento }}">
        <input type="hidden" name="tipo_entrega" value="{{ tipo_entrega }}">
        <input type="hidden" name="fecha_entrega" id="fecha_entrega" required>

        <section class="opciones">

            {% for fecha in fechas %}

            <button type="button" class="opcion boton-fecha" data-fecha="{{ fecha.fecha }}">
                {{ fecha.fecha }}
            </button>

            {% endfor %}

        </section>

        <button type="submit" class="boton"> Confirmar </button>

    </form>

    {% if mensaje %}
        <div id="mensaje" class="mensaje"> {{ mensaje }} </div>
    {% endif %}

    <br><br>

    {% if mostrar_factura %}

    <form action="{{ url_for('clientes.generar_factura_client', solicitud_id=solicitud_id) }}">
        <button type="submit" id ="boton-pdf"> Generar Factura </button>
    </form>

    {% endif %}


</main>

<script>
const opciones = document.querySelectorAll(".opcion");
const fechaEntregaInput = document.getElementById("fecha_entrega");

opciones.forEach(opcion => {
    opcion.addEventListener("click", function () {

        opciones.forEach(o => o.classList.remove("seleccionada"));
        this.classList.add("seleccionada");

        fechaEntregaInput.value = this.dataset.fecha;
    });
});
</script>

</body>



</html>
